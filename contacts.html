<!DOCTYPE html>
<html lang="lo" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ລະບົບຜູ້ດູແລ MOLSW</title>
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- App Root Grid -->
    <div id="app-container">
        
        <!-- Sidebar Navigation -->
        <aside>
            <div class="sidebar-brand">
                <img src="logo.png" alt="MOLSW Logo" class="brand-logo" onerror="this.style.display='none'">
                <span class="brand-name">ຜູ້ດູແລ MOLSW</span>
            </div>
            
            <ul class="sidebar-menu">
                <li class="sidebar-menu-item">
                    <a href="index.html">
                        <!-- Home Icon -->
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z"/></svg>
                        <span>ແຜງຄວບຄຸມ</span>
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a href="news.html">
                        <!-- News Icon -->
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>
                        <span>ຈັດການຂ່າວສານ</span>
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a href="about.html">
                        <!-- About Icon -->
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        <span>ຂໍ້ມູນກ່ຽວກັບ</span>
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a href="org.html">
                        <!-- Organization Icon -->
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                        <span>ອົງກອນ / ໂຄງຮ່າງ</span>
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a href="sectors.html">
                        <!-- Sector Icon -->
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                        <span>ຂະແໜງການ</span>
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a href="activities.html">
                        <!-- Activities Icon -->
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                        <span>ກິດຈະກຳ</span>
                    </a>
                </li>
                <li class="sidebar-menu-item active"><a href="contacts.html">
                        <!-- Mail Icon -->
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                        <span>ກ່ອງຂໍ້ຄວາມຕິດຕໍ່</span>
                    </a>
                </li>
            </ul>
            
            <div class="sidebar-footer">
                <button class="collapse-btn" id="btn-collapse-sidebar">
                    <!-- Collapse Icon -->
                    <svg style="width:16px; height:16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/></svg>
                    <span>ຫຍໍ້ເມນູ</span>
                </button>
            </div>
        </aside>
        
        <!-- Main Panel -->
        <div class="main-content">
            <header>
                <div class="header-left">
                    <button class="mobile-menu-toggle" id="mobile-burger-btn">
                        <!-- Menu Burger Icon -->
                        <svg style="width:24px; height:24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                    </button>
                    <h1 class="page-title" id="view-title">ກ່ອງຂໍ້ຄວາມຕິດຕໍ່</h1>
                </div>
                
                <div class="header-right">
                    <!-- Theme Toggle -->
                    <button class="icon-action-btn theme-toggle" id="btn-theme-toggle" title="ປ່ຽນຮູບແບບ (ມືດ/ສະຫວ່າງ)">
                        <svg class="sun-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        <svg class="moon-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    </button>
                    
                    <!-- Notification Bell -->
                    <button class="icon-action-btn" title="ຂໍ້ຄວາມລະບົບ">
                        <svg style="width:20px; height:20px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                        <span class="badge-dot"></span>
                    </button>
                    
                    <!-- Profile Dropdown -->
                    <div class="profile-badge-wrapper">
                        <div class="profile-badge" id="profile-dropdown-btn">
                            <div class="avatar" id="header-user-avatar">AD</div>
                            <div class="profile-info">
                                <span class="profile-name" id="header-user-name">ຜູ້ດູແລລະບົບ</span>
                                <span class="profile-role" id="header-user-role">ຜູ້ບໍລິຫານສູງສຸດ</span>
                            </div>
                            <svg class="dropdown-chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:12px; height:12px; margin-left:4px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                        </div>
                        <div class="profile-dropdown" id="profile-dropdown-menu">
                            <div class="dropdown-item" onclick="switchUserRole('super_admin')">
                                <span class="role-avatar SA">SA</span>
                                <div class="role-desc">
                                    <span class="role-title">Super Admin</span>
                                    <span class="role-sub">ຜູ້ບໍລິຫານສູງສຸດ</span>
                                </div>
                            </div>
                            <div class="dropdown-item" onclick="switchUserRole('admin')">
                                <span class="role-avatar AD">AD</span>
                                <div class="role-desc">
                                    <span class="role-title">Admin</span>
                                    <span class="role-sub">ຜູ້ດູແລລະບົບ</span>
                                </div>
                            </div>
                            <div class="dropdown-item" onclick="switchUserRole('maker')">
                                <span class="role-avatar MK">MK</span>
                                <div class="role-desc">
                                    <span class="role-title">Maker</span>
                                    <span class="role-sub">ຜູ້ສ້າງເນື້ອຫາ</span>
                                </div>
                            </div>
                            <div class="dropdown-item" onclick="switchUserRole('checker')">
                                <span class="role-avatar CK">CK</span>
                                <div class="role-desc">
                                    <span class="role-title">Checker</span>
                                    <span class="role-sub">ຜູ້ກວດສອບ</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </header>
            
            <!-- Page Router Workspace -->
            <main class="content-body" id="app-view">
undefined
</main>
        </div>
    </div>
    
    <!-- Toast Notifications Container -->
    <div id="toast-container" class="toast-container"></div>

        <!-- PAGE-SPECIFIC MODALS -->


    <!-- Core App Controller Script -->
    <script src="ui.js"></script>
</body>

</html>
